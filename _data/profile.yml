short_bio: >-
  <p>
    I am currently an undergraduate student pursuing a B.Sc. in Computer Science and Technology at
    <a href="https://bnbu.edu.cn" target="_blank" rel="noopener">Beijing Normal-Hong Kong Baptist University</a>.
  </p>
  <p class="availability-note">
    I am actively looking for an MPhil/PhD position for Fall 2027, as well as research collaboration
    and internship opportunities.
  </p>
  <p>
    My current research interests include <strong>large language models</strong>, especially
    trustworthy and high-efficiency LLMs, and <strong>3D Gaussian Splatting</strong>.
    I am currently a research assistant at the Binjiang Institute of Zhejiang University,
    working with
    <a href="https://scholar.google.com/citations?user=2S80TvwAAAAJ" target="_blank" rel="noopener">Dr. Wenpeng Xing</a>
    and
    <a href="https://scholar.google.com/citations?user=TnCrl1cAAAAJ" target="_blank" rel="noopener">Prof. Meng Han</a>.
  </p>
  <p>
    I also have a strong background in competitive programming, with experience in NOIP and ICPC/CCPC.
  </p>

